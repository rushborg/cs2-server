name: Build CS2 Server Image + Agent

on:
  push:
    branches: [main]
    paths:
      - "docker/cs2-server/**"
      - "agent/**"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/cs2-server

jobs:
  build-cs2-image:
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build CS2 image
        working-directory: docker/cs2-server
        run: |
          docker build \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            .

      - name: Push CS2 image
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Cleanup old images
        run: |
          docker image prune -f --filter "until=48h" || true

  build-agent:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Build agent
        working-directory: agent
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=${{ matrix.arch }} \
            go build -ldflags "-s -w -X main.version=${{ github.sha }}" \
            -o ../dist/rushborg-agent-${{ matrix.arch }} \
            ./cmd/rushborg-agent

      - uses: actions/upload-artifact@v4
        with:
          name: agent-${{ matrix.arch }}
          path: dist/rushborg-agent-${{ matrix.arch }}

  release-agent:
    needs: build-agent
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: agent-amd64
          path: dist/

      - uses: actions/download-artifact@v4
        with:
          name: agent-arm64
          path: dist/

      - name: Create/update release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Delete existing 'latest' release if exists
          gh release delete agent-latest --yes --repo ${{ github.repository }} 2>/dev/null || true
          git push --delete origin agent-latest 2>/dev/null || true

          # Create new release with agent binaries
          gh release create agent-latest \
            --repo ${{ github.repository }} \
            --title "Agent Build ${{ github.sha }}" \
            --notes "Auto-built agent binary from commit ${{ github.sha }}" \
            --prerelease \
            dist/rushborg-agent-amd64 \
            dist/rushborg-agent-arm64
